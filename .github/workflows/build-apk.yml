name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Go Library
        run: |
          cd golib
          # Assuming gomobile is needed or a simple go build for android
          # If gomobile is not set up, we might need to install it
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
          gomobile bind -target android -o ../android/app/libs/golib.aar .
        continue-on-error: true # In case the project structure differs slightly

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (arm64-v8a)
        run: flutter build apk --target-platform android-arm64 --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
