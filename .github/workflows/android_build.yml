name: Android APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java Development Kit
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21.x' # Using a recent stable Go version

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x' # Use a recent stable Flutter version
        channel: 'stable'

    - name: Install Android SDK components
      run: |
        sdkmanager "platforms;android-34"
        sdkmanager "build-tools;34.0.0"
        sdkmanager "ndk;26.0.10792818"
        yes | sdkmanager --licenses

    - name: Install Go Mobile (gomobile)
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        gomobile init

    - name: Build Go Library and Flutter APK
      run: |
        chmod +x ./natproxy-android/build-android.sh
        cd natproxy-android
        ./build-android.sh arm
        flutter pub get
        flutter build apk --release

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: natproxy-android/build/app/outputs/flutter-apk/app-release.apk
