name: Android APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java Development Kit
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21.x'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        channel: 'stable'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK components
      run: |
        sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.0.10792818"
        yes | sdkmanager --licenses

    - name: Install Go Mobile (gomobile)
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
        gomobile init

    - name: Build Go Library
      run: |
        cd golib
        mkdir -p ../android/app/libs
        gomobile bind -v -ldflags="-checklinkname=0" -target="android/arm64" -androidapi=24 -o ../android/app/libs/golib.aar ./

    - name: Build Flutter APK (arm64-v8a)
      run: |
        flutter pub get
        flutter build apk --release --target-platform android-arm64 --android-skip-build-dependency-validation

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-arm64-v8a-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
