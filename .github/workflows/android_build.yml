name: Android APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: golib/go.sum

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Go Library
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          # Use a compatible NDK version (NDK 25.2 is reliable with gomobile)
          # The default NDK 27 in ubuntu-latest has some API version issues with gomobile
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653
          gomobile init
          cd golib
          gomobile bind -target android -o ../android/app/libs/golib.aar .

      - name: Build APK (arm64-v8a)
        run: flutter build apk --target-platform android-arm64 --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
